# Single persistent mesh node — env-driven, persistent PeerID.
#
# Usage (Mac, PC, Linux server — all the same):
#   1. cp .env.example .env
#   2. Edit .env (set MESH_BOOTSTRAP_PEERS if joining an existing mesh)
#   3. docker compose -f docker-compose.node.yml up -d --build
#   4. docker compose -f docker-compose.node.yml logs -f
#
# Windows (ck-racing) prerequisites:
#   - Docker Desktop with WSL2 backend
#   - Inbound TCP 4001 allowed in Windows Firewall
#   - Use the named volume below (do NOT bind-mount to C:\... — better-sqlite3 on NTFS is slow)

services:
  mesh:
    container_name: attestto-mesh
    build: .
    restart: unless-stopped
    ports:
      - "${MESH_LISTEN_PORT:-4001}:${MESH_LISTEN_PORT:-4001}"
    environment:
      MESH_DATA_DIR: /data/mesh
      MESH_LISTEN_PORT: ${MESH_LISTEN_PORT:-4001}
      MESH_LISTEN_ADDRESS: 0.0.0.0
      MESH_BOOTSTRAP_PEERS: ${MESH_BOOTSTRAP_PEERS:-}
      MESH_ID: ${MESH_ID:-attestto-cr}
      MESH_MAX_STORAGE_MB: ${MESH_MAX_STORAGE_MB:-250}
      MESH_RELAY_SERVER: ${MESH_RELAY_SERVER:-0}
      MESH_STATUS_INTERVAL: ${MESH_STATUS_INTERVAL:-30000}
    volumes:
      - mesh-data:/data/mesh

volumes:
  mesh-data:
