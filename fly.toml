# fly.toml app configuration file generated for attestto-anchor-cr on 2026-04-08T10:43:24-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'attestto-anchor-cr'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  MESH_DATA_DIR = '/data/mesh'
  MESH_ID = 'attestto-cr'
  MESH_LISTEN_ADDRESS = '0.0.0.0'
  MESH_LISTEN_PORT = '4001'
  MESH_MAX_STORAGE_MB = '2048'
  MESH_RELAY_SERVER = '1'
  MESH_STATUS_INTERVAL = '60000'

[[mounts]]
  source = 'mesh_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 4001
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 4001

  [services.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
