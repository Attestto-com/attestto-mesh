name: SonarCloud Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sonar:
    name: Lint · Test · Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud blame data

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Stub guard
        run: |
          PATTERNS=(
            "// *(TODO|FIXME|HACK|XXX|PLACEHOLDER|placeholder)"
            "did:(web|example):demo"
            "did:(web|example):medico|did:example:"
            "['\"]fake[_-]|['\"]dummy[_-]|['\"]sample[_-]"
            "alert\(['\"]"
            "coming.?soon|próximamente|proximamente"
            "not yet implemented|not implemented"
            "'00000'|\"00000\""
          )
          EXCLUDE="node_modules/\|/dist/\|__tests__/\|__mocks__/\|/demo/\|/scripts/\|/fixtures/\|\.test\.\|\.spec\.\|vitest\.\|jest\."
          INCLUDE='\.ts:\|\.tsx:\|\.vue:\|\.js:\|\.mjs:'
          ALLOW='stub-guard-ignore\|/i18n/\|/locales/\|@example\|/\*\*\|^ *\*'
          HITS=0
          for pat in "${PATTERNS[@]}"; do
            matches=$(grep -rEn -i "$pat" src 2>/dev/null | grep "$INCLUDE" | grep -v "$EXCLUDE" | grep -v "$ALLOW" || true)
            if [ -n "$matches" ]; then
              echo "$matches"
              HITS=$((HITS + $(echo "$matches" | wc -l)))
            fi
          done
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Stub guard failed: $HITS stub(s) found"
            exit 1
          fi
          echo "Stub guard passed"

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
