sonar.projectKey=attestto_attestto-mesh
sonar.organization=attestto
sonar.projectName=Attestto Mesh
sonar.projectVersion=0.1.0

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.language=ts

# Coverage report (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript config
sonar.typescript.tsconfigPaths=tsconfig.json

# Exclusions
sonar.exclusions=dist/**,node_modules/**,coverage/**,demo/**
sonar.test.exclusions=dist/**,node_modules/**

# Quality gate — fail if any of these are violated
# Configured in SonarCloud UI under Quality Gates
